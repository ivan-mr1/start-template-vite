<div class="section__body tabs" data-js-tabs>
  <header class="tabs__header">
    <div class="tabs__buttons" role="tablist">
      <button
        class="tabs__button is-active"
        id="tab-1"
        type="button"
        role="tab"
        aria-controls="tabpanel-1"
        data-js-tabs-button
        aria-selected="true"
      >
        All works
      </button>
      <button
        class="tabs__button"
        id="tab-2"
        type="button"
        role="tab"
        aria-controls="tabpanel-2"
        data-js-tabs-button
        aria-selected="false"
        tabindex="-1"
      >
        HTML + CSS
      </button>
      <button
        class="tabs__button"
        id="tab-3"
        type="button"
        role="tab"
        aria-controls="tabpanel-3"
        data-js-tabs-button
        aria-selected="false"
        tabindex="-1"
      >
        JavaScript
      </button>
      <button
        class="tabs__button"
        id="tab-4"
        type="button"
        role="tab"
        aria-controls="tabpanel-4"
        data-js-tabs-button
        aria-selected="false"
        tabindex="-1"
      >
        React
      </button>
      <button
        class="tabs__button"
        id="tab-5"
        type="button"
        role="tab"
        aria-controls="tabpanel-5"
        data-js-tabs-button
        aria-selected="false"
        tabindex="-1"
      >
        Vue.js
      </button>
    </div>
  </header>
  <div class="tabs__body">
    <div
      class="tabs__content is-active"
      id="tabpanel-1"
      role="tabpanel"
      aria-labelledby="tab-1"
      tabindex="0"
      data-js-tabs-content
    >
      <ul class="portfolio__items" data-portfolio="all"></ul>
    </div>
    <div
      class="tabs__content"
      id="tabpanel-2"
      role="tabpanel"
      aria-labelledby="tab-2"
      tabindex="0"
      data-js-tabs-content
    >
      <ul class="portfolio__items" data-portfolio="htmlcss"></ul>
    </div>
    <div
      class="tabs__content"
      id="tabpanel-3"
      role="tabpanel"
      aria-labelledby="tab-3"
      tabindex="0"
      data-js-tabs-content
    >
      <ul class="portfolio__items" data-portfolio="javascript"></ul>
    </div>
    <div
      class="tabs__content"
      id="tabpanel-4"
      role="tabpanel"
      aria-labelledby="tab-4"
      tabindex="0"
      data-js-tabs-content
    >
      <ul class="portfolio__items" data-portfolio="react"></ul>
    </div>
    <div
      class="tabs__content"
      id="tabpanel-5"
      role="tabpanel"
      aria-labelledby="tab-5"
      tabindex="0"
      data-js-tabs-content
    >
      <ul class="portfolio__items" data-portfolio="vue"></ul>
    </div>
  </div>
</div>
