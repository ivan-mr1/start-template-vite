<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ivan F portfolio - web development, front-end."
    />
    <title>Ivan Fomin Portfolio</title>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/img/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/img/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/img/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="assets/img/favicon/site.webmanifest" />
    <link rel="stylesheet" href="styles/main.scss" />
    <script type="module" src="js/app.js"></script>
  </head>

  <body>
    <div class="wrapper">
      <header class="header" data-header data-right-padding>
        <div class="header__container">
          <div class="header__overlay">
            <nav class="header__menu menu" data-header-menu>
              <ul class="menu__list">
                <li class="menu__item">
                  <a href="#" class="menu__link hover-link" data-goto=".about"
                    >ABOUT ME</a
                  >
                </li>
              </ul>
            </nav>
            <div class="header__actions">
              <a
                target="_blank"
                href=""
                class="header__github"
                aria-label="Open github"
                title="Open github"
              >
                <img
                  src="assets/img/soc1al/github.svg"
                  alt="github"
                  class="header__github-img"
                  width="48"
                  height="48"
                />
              </a>
            </div>
          </div>
          <button
            type="button"
            class="header__burger-button burger-button"
            data-header-burger-btn
            aria-label="Open or close menu"
            title="Open or close menu"
          >
            <span class="burger-button__inner">
              <span class="burger-button__line"></span>
              <span class="burger-button__line"></span>
              <span class="burger-button__line"></span>
            </span>
          </button>
        </div>
      </header>
      <main class="page">
        <section
          class="parent-video-fon page__hero hero"
          aria-labelledby="hero-title"
        >
          <div class="hero__container">
            <div class="hero__body">
              <h1 class="hero__title" id="hero-title"></h1>
            </div>
          </div>
          <video class="video-fon" autoplay muted loop>
            <source type="video/mp4" src="assets/video/3.mp4" />
          </video>
          <button
            type="button"
            class="scroll-down-btn"
            data-goto=".about"
            title="scroll down"
            aria-label="scroll-down"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="50"
              height="80"
              viewBox="0 0 50 80"
            >
              <path
                class="first-path"
                fill="#FFFFFF"
                d="M24.752,79.182c-0.397,0-0.752-0.154-1.06-0.463L2.207,57.234c-0.306-0.305-0.458-0.656-0.458-1.057
        s0.152-0.752,0.458-1.059l2.305-2.305c0.309-0.309,0.663-0.461,1.06-0.461c0.398,0,0.752,0.152,1.061,0.461l18.119,18.119
        l18.122-18.119c0.306-0.309,0.657-0.461,1.057-0.461c0.402,0,0.753,0.152,1.059,0.461l2.306,2.305
        c0.308,0.307,0.461,0.658,0.461,1.059s-0.153,0.752-0.461,1.057L25.813,78.719C25.504,79.027,25.15,79.182,24.752,79.182z"
              />
              <path
                class="second-path"
                fill="#FFFFFF"
                d="M24.752,58.25c-0.397,0-0.752-0.154-1.06-0.463L2.207,36.303c-0.306-0.304-0.458-0.655-0.458-1.057
        c0-0.4,0.152-0.752,0.458-1.058l2.305-2.305c0.309-0.308,0.663-0.461,1.06-0.461c0.398,0,0.752,0.153,1.061,0.461l18.119,18.12
        l18.122-18.12c0.306-0.308,0.657-0.461,1.057-0.461c0.402,0,0.753,0.153,1.059,0.461l2.306,2.305
        c0.308,0.306,0.461,0.657,0.461,1.058c0,0.401-0.153,0.753-0.461,1.057L25.813,57.787C25.504,58.096,25.15,58.25,24.752,58.25z"
              />
            </svg>
          </button>
        </section>
      </main>
      <footer class="footer">
        <div class="footer__container"></div>
      </footer>
    </div>
  </body>
</html>
